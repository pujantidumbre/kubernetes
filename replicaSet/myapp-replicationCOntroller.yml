apiVersion: v1
kind: ReplicationController
metadata:
  name: myapp-rc
  labels:
    app: myapp-rc
    appType: backend
spec:
  template:
    metadata: 
      name: myapp-v1
      labels:
        app-type: backend
        app: myapp
    spec:
      containers:
      - image: dhananjay01/myapp:ubux64
        name: myapp-v1
      imagePullSecrets: 
        - name: dockerhub-secrets
  replicas: 3
  selector:
    app-type: backend
    app: myapp
