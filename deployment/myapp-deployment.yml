apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    app: myapp
    app-type: backend
spec:
  template:
    metadata:
      name: myapp-v1
      labels:
        app-type: backend
        app: myapp
    spec:
      containers:
        - image: dhananjay01/myapp:ubux64
          name: myapp-v1
      imagePullSecrets:
        - name: dockerhub-secrets
  replicas: 3
  selector:
    matchLabels:
      app-type: backend
      app: myapp
